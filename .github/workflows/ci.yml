name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Format · Build
    runs-on: ubuntu-latest

    env:
      # Placeholders são suficientes para os checks abaixo. Builds reais
      # de produção são feitos pela Vercel com env vars do projeto.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/meus_audios?schema=public
      AUTH_SECRET: ci-placeholder-secret
      AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
